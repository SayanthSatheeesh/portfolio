<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>404 - Page Not Found · Sayanth Satheesh</title>
        
        <meta name="robots" content="noindex, follow">
        <meta name="theme-color" content="#0a0a0a">

        <!-- Google Fonts: Inter -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
        
        <!-- External CSS -->
        <link rel="stylesheet" href="/portfolio/styles.css">
        <style>
                .error-page {
                        min-height: 80vh;
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        justify-content: center;
                        text-align: center;
                        padding: 2rem;
                }
                .error-title {
                        font-size: clamp(6rem, 20vw, 12rem);
                        font-weight: 700;
                        color: var(--accent);
                        line-height: 1;
                        margin-bottom: 1rem;
                        font-family: var(--font-sans);
                }
                .error-desc {
                        font-size: clamp(1.2rem, 3vw, 1.5rem);
                        color: var(--text-secondary);
                        margin-bottom: 3rem;
                }
                .error-btn {
                        display: inline-block;
                        padding: 1rem 2.5rem;
                        background: rgba(16, 185, 129, 0.1);
                        border: 1px solid var(--accent);
                        color: var(--accent);
                        border-radius: 100px;
                        font-weight: 600;
                        text-decoration: none;
                        transition: all 0.3s ease;
                }
                .error-btn:hover {
                        background: var(--accent);
                        color: #000;
                        box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
                        transform: translateY(-2px);
                }
        </style>
</head>

<body>
        <div class="noise-overlay"></div>
        <nav class="navbar">
                <div class="nav-container">
                        <div class="nav-links" style="justify-content: center;">
                                <a href="/portfolio/">Return Home</a>
                        </div>
                </div>
        </nav>
        
        <main role="main">
                <section class="error-page fade-section">
                        <h1 class="error-title">404</h1>
                        <p class="error-desc">The page you are looking for has been lost in the cloud.</p>
                        <a href="/portfolio/" class="error-btn">RETURN HOME</a>
                </section>
        </main>
        
        <footer class="footer" style="position: absolute; bottom: 0; width: 100%;">
                <div class="container">
                        <p>© 2025 Sayanth Satheesh. All rights reserved.</p>
                </div>
        </footer>
</body>
</html>
